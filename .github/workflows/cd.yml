name: cd
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
  steps:
    - name: checkout code
      uses: actions/checkout@v4
    - name: setup node
      uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: install deps
      run: npm ci
    - name: build app
      run: npm run build
